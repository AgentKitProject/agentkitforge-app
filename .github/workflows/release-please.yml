name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      html_url: ${{ steps.release.outputs.html_url }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Print Release Please outputs
        run: |
          echo "release_created=${{ steps.release.outputs.release_created }}"
          echo "releases_created=${{ steps.release.outputs.releases_created }}"
          echo "tag_name=${{ steps.release.outputs.tag_name }}"
          echo "version=${{ steps.release.outputs.version }}"
          echo "html_url=${{ steps.release.outputs.html_url }}"

      - name: Set GitHub Release title
        if: ${{ (steps.release.outputs.release_created == 'true' || steps.release.outputs.releases_created == 'true') && steps.release.outputs.tag_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --title "AgentKitForge $TAG_NAME"

  build-release-artifacts:
    name: Build and upload release artifacts
    runs-on: windows-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.releases_created == 'true' }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Determine release version
        id: release-info
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_URL: ${{ needs.release-please.outputs.html_url }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release Please did not provide a release tag."
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          $version = $env:RELEASE_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $tag.Substring(1)
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Release version '$version' is not a valid SemVer version."
          }

          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($packageVersion -ne $version) {
            throw "package.json version '$packageVersion' does not match release version '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_url=$env:RELEASE_URL" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build Tauri app
        run: npm run build:tauri

      - name: Verify bundled backend runtime
        run: npm run check:backend

      - name: Verify Tauri sidecar output
        run: npm run check:tauri-sidecar

      - name: Collect release artifacts
        id: artifacts
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $setupSource = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $setupSource) {
            throw "No NSIS setup executable found."
          }

          $msiSource = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msiSource) {
            throw "No MSI installer found."
          }

          $setupOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-setup.exe"
          $msiOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-x64.msi"
          $checksumsOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-checksums.txt"

          Copy-Item -LiteralPath $setupSource.FullName -Destination $setupOut -Force
          Copy-Item -LiteralPath $msiSource.FullName -Destination $msiOut -Force

          Get-FileHash $setupOut, $msiOut -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -LiteralPath $checksumsOut -Encoding ascii

          "setup=$setupOut" >> $env:GITHUB_OUTPUT
          "msi=$msiOut" >> $env:GITHUB_OUTPUT
          "checksums=$checksumsOut" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-info.outputs.tag }}
        run: |
          gh release upload $env:TAG `
            "${{ steps.artifacts.outputs.setup }}" `
            "${{ steps.artifacts.outputs.msi }}" `
            "${{ steps.artifacts.outputs.checksums }}" `
            "RELEASE_NOTES.md" `
            --clobber

      - name: Require infra dispatch token
        shell: pwsh
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:INFRA_DISPATCH_TOKEN)) {
            throw "AGENTKIT_INFRA_DISPATCH_TOKEN is required to dispatch the private infra mirror workflow after artifact upload."
          }

      - name: Trigger private infra mirror
        shell: pwsh
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
          VERSION: ${{ steps.release-info.outputs.version }}
          TAG: ${{ steps.release-info.outputs.tag }}
          RELEASE_URL: ${{ steps.release-info.outputs.release_url }}
          REPOSITORY: AgentKitProject/agentkitforge-app
        run: |
          $payload = @{
            event_type = "app-release-published"
            client_payload = @{
              version = $env:VERSION
              tag = $env:TAG
              repository = $env:REPOSITORY
              release_url = $env:RELEASE_URL
            }
          } | ConvertTo-Json -Depth 5 -Compress

          Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/AgentKitProject/agentkitforge-infra/dispatches" `
            -Headers @{
              Authorization = "Bearer $env:INFRA_DISPATCH_TOKEN"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            } `
            -Body $payload `
            -ContentType "application/json"
