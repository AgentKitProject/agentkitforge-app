name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write
  issues: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}
      html_url: ${{ steps.release.outputs.html_url }}
    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Print Release Please outputs
        run: |
          echo "release_created=${{ steps.release.outputs.release_created }}"
          echo "releases_created=${{ steps.release.outputs.releases_created }}"
          echo "tag_name=${{ steps.release.outputs.tag_name }}"
          echo "version=${{ steps.release.outputs.version }}"
          echo "html_url=${{ steps.release.outputs.html_url }}"

      - name: Set GitHub Release title
        if: ${{ (steps.release.outputs.release_created == 'true' || steps.release.outputs.releases_created == 'true') && steps.release.outputs.tag_name != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --title "AgentKitForge $TAG_NAME"

  build-release-artifacts:
    name: Build and upload ${{ matrix.platform }} release artifacts
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      actions: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
          - platform: linux
            os: ubuntu-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Determine release version
        id: release-info
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
          RELEASE_URL: ${{ needs.release-please.outputs.html_url }}
        run: |
          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release Please did not provide a release tag."
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          $version = $env:RELEASE_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $tag.Substring(1)
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Release version '$version' is not a valid SemVer version."
          }

          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($packageVersion -ne $version) {
            throw "package.json version '$packageVersion' does not match release version '$version'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_url=$env:RELEASE_URL" >> $env:GITHUB_OUTPUT

      - name: Validate Apple signing secrets
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_API_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing/notarization secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          certificate_path="$RUNNER_TEMP/developer_id_application.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          identities_file="$RUNNER_TEMP/codesigning-identities.txt"
          security find-identity -v -p codesigning "$keychain_path" | tee "$identities_file"

          if grep -q "0 valid identities found" "$identities_file"; then
            echo "No valid code signing identities were found after importing APPLE_CERTIFICATE_BASE64. Confirm the .p12 contains both the Developer ID Application certificate and its private key." >&2
            exit 1
          fi

          if ! grep -q "Developer ID Application" "$identities_file"; then
            echo "No Developer ID Application identity was found after importing APPLE_CERTIFICATE_BASE64." >&2
            echo "Available signing identity display names:" >&2
            awk -F'"' '/[A-Fa-f0-9]{40}/ { print "- " $2 }' "$identities_file" >&2
            exit 1
          fi

          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            matching_line="$(awk -F'"' -v target="$APPLE_SIGNING_IDENTITY" '$2 == target { print; exit }' "$identities_file")"
            if [ -z "$matching_line" ]; then
              echo "APPLE_SIGNING_IDENTITY does not match any imported signing identity." >&2
              echo "APPLE_SIGNING_IDENTITY does not match the imported identity. Use the exact value shown by security find-identity." >&2
              echo "Available signing identity display names:" >&2
              awk -F'"' '/[A-Fa-f0-9]{40}/ { print "- " $2 }' "$identities_file" >&2
              exit 1
            fi
          else
            matching_line="$(grep "Developer ID Application" "$identities_file" | head -n 1)"
          fi

          identity_hash="$(sed -E 's/^[[:space:]]*[0-9]+\) ([A-Fa-f0-9]{40}) .*/\1/' <<< "$matching_line")"
          if [[ ! "$identity_hash" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            echo "Could not extract SHA-1 signing identity hash from imported Developer ID Application identity." >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY_HASH=$identity_hash" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=$identity_hash" >> "$GITHUB_ENV"
          echo "Developer ID Application signing identity imported successfully."
          echo "Using Developer ID Application identity hash: $identity_hash"

      - name: Prepare App Store Connect API key
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          private_keys_dir="$RUNNER_TEMP/private_keys"
          mkdir -p "$private_keys_dir"
          api_key_path="$private_keys_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          echo "Prepared App Store Connect API key file."

      - name: Preflight codesign identity
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY_HASH:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY_HASH was not set after certificate import." >&2
            exit 1
          fi

          preflight_dir="$RUNNER_TEMP/codesign-preflight"
          preflight_executable="$preflight_dir/preflight"
          mkdir -p "$preflight_dir"
          printf '%s\n' '#!/bin/sh' 'exit 0' > "$preflight_executable"
          chmod +x "$preflight_executable"

          if ! codesign --force --sign "$APPLE_SIGNING_IDENTITY_HASH" --timestamp=none "$preflight_executable"; then
            echo "Preflight codesign failed. The certificate was imported but codesign cannot use it." >&2
            exit 1
          fi

          codesign --verify --verbose "$preflight_executable"
          echo "Preflight codesign succeeded with identity hash: $APPLE_SIGNING_IDENTITY_HASH"

      - name: Install dependencies
        run: npm ci

      - name: Install Linux Tauri dependencies
        if: ${{ matrix.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Validate Tauri updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY is required to create signed Tauri updater artifacts."
          }

      - name: Build backend runtime
        run: npm run build:backend

      - name: Run checks
        run: npm run check

      - name: Build Tauri app
        if: ${{ matrix.platform != 'macos' }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build:tauri -- --config src-tauri/tauri.updater.conf.json

      - name: Build signed Tauri app bundle
        if: ${{ matrix.platform == 'macos' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build:tauri -- --config src-tauri/tauri.updater.conf.json --bundles app

      - name: Sign macOS Node sidecar with V8 entitlements
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY_HASH:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY_HASH was not set after certificate import." >&2
            exit 1
          fi

          app_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'AgentKitForge.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found before Node sidecar signing." >&2
            exit 1
          fi

          node_path="$app_path/Contents/MacOS/node"
          main_executable="$app_path/Contents/MacOS/agentkitforge-app"
          entitlements_path="src-tauri/entitlements/node-sidecar.entitlements.plist"

          if [ ! -f "$node_path" ]; then
            echo "Bundled Node sidecar not found at $node_path" >&2
            exit 1
          fi
          if [ ! -f "$main_executable" ]; then
            echo "Main app executable not found at $main_executable" >&2
            exit 1
          fi
          if [ ! -f "$entitlements_path" ]; then
            echo "Node sidecar entitlements file not found at $entitlements_path" >&2
            exit 1
          fi

          echo "Signing bundled Node sidecar with V8 hardened runtime entitlements: $node_path"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY_HASH" \
            --entitlements "$entitlements_path" \
            "$node_path"

          node_entitlements="$RUNNER_TEMP/node-sidecar-entitlements.plist"
          codesign -d --entitlements :- "$node_path" > "$node_entitlements" 2>&1
          cat "$node_entitlements"
          grep -q "com.apple.security.cs.allow-jit" "$node_entitlements"
          grep -q "com.apple.security.cs.allow-unsigned-executable-memory" "$node_entitlements"

          echo "Verifying signed Node sidecar."
          codesign --verify --strict --verbose=2 "$node_path"

          echo "Re-signing main app executable after nested sidecar signing: $main_executable"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY_HASH" \
            "$main_executable"

          echo "Re-signing .app bundle after nested sidecar signing: $app_path"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY_HASH" \
            "$app_path"

          echo "Verifying re-signed .app bundle."
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Bundle signed macOS DMG
        if: ${{ matrix.platform == 'macos' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm exec tauri -- bundle --config src-tauri/tauri.updater.conf.json --bundles dmg

      - name: Re-sign Node sidecar and repack macOS DMG
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY_HASH:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY_HASH was not set after certificate import." >&2
            exit 1
          fi

          app_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name 'AgentKitForge.app' -type d | head -n 1)"
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"
          dmg_script="src-tauri/target/release/bundle/dmg/bundle_dmg.sh"
          node_path="$app_path/Contents/MacOS/node"
          main_executable="$app_path/Contents/MacOS/agentkitforge-app"
          entitlements_path="src-tauri/entitlements/node-sidecar.entitlements.plist"

          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found before final DMG repack." >&2
            exit 1
          fi
          if [ -z "$dmg_path" ]; then
            echo "No macOS DMG found before final DMG repack." >&2
            exit 1
          fi
          if [ ! -f "$dmg_script" ]; then
            echo "Generated DMG bundling script not found at $dmg_script" >&2
            exit 1
          fi
          chmod +x "$dmg_script"
          if [ ! -f "$node_path" ]; then
            echo "Bundled Node sidecar not found at $node_path" >&2
            exit 1
          fi
          if [ ! -f "$main_executable" ]; then
            echo "Main app executable not found at $main_executable" >&2
            exit 1
          fi
          if [ ! -f "$entitlements_path" ]; then
            echo "Node sidecar entitlements file not found at $entitlements_path" >&2
            exit 1
          fi

          echo "Re-signing bundled Node sidecar after DMG generation: $node_path"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY_HASH" \
            --entitlements "$entitlements_path" \
            "$node_path"

          node_entitlements="$RUNNER_TEMP/final-node-sidecar-entitlements.plist"
          codesign -d --entitlements :- "$node_path" > "$node_entitlements" 2>&1
          cat "$node_entitlements"
          grep -q "com.apple.security.cs.allow-jit" "$node_entitlements"
          grep -q "com.apple.security.cs.allow-unsigned-executable-memory" "$node_entitlements"

          echo "Verifying final signed Node sidecar."
          codesign --verify --strict --verbose=2 "$node_path"

          echo "Re-signing main app executable after final nested sidecar signing: $main_executable"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY_HASH" \
            "$main_executable"

          echo "Re-signing .app bundle before final DMG repack: $app_path"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY_HASH" \
            "$app_path"

          echo "Verifying final .app bundle before DMG repack."
          codesign --verify --deep --strict --verbose=2 "$app_path"

          dmg_source_dir="$RUNNER_TEMP/agentkitforge-dmg-source"
          rm -rf "$dmg_source_dir"
          mkdir -p "$dmg_source_dir"
          ditto "$app_path" "$dmg_source_dir/AgentKitForge.app"

          echo "Repacking macOS DMG from entitlement-signed app: $dmg_path"
          rm -f "$dmg_path"
          "$dmg_script" \
            --volname "AgentKitForge" \
            --volicon "src-tauri/target/release/bundle/dmg/icon.icns" \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "AgentKitForge.app" 180 170 \
            --hide-extension "AgentKitForge.app" \
            --app-drop-link 480 170 \
            --no-internet-enable \
            --skip-jenkins \
            "$dmg_path" \
            "$dmg_source_dir"

          echo "Signing repacked macOS DMG: $dmg_path"
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY_HASH" "$dmg_path"
          codesign --verify --deep --strict --verbose=2 "$dmg_path"

      - name: List macOS bundle outputs
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: find src-tauri/target/release/bundle -maxdepth 5 -type f | sort

      - name: Verify bundled backend runtime
        run: npm run check:backend

      - name: Verify Tauri sidecar output
        run: npm run check:tauri-sidecar

      - name: Verify macOS signing and notarization
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"

          if [ -z "$dmg_path" ]; then
            echo "No macOS DMG found to verify." >&2
            exit 1
          fi

          if [ -z "${APPLE_API_KEY_PATH:-}" ]; then
            echo "APPLE_API_KEY_PATH was not prepared before DMG notarization." >&2
            exit 1
          fi

          echo "Submitting final DMG for notarization: $dmg_path"
          xcrun notarytool submit "$dmg_path" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          echo "Stapling final DMG notarization ticket: $dmg_path"
          xcrun stapler staple "$dmg_path"

          echo "Validating DMG notarization ticket: $dmg_path"
          xcrun stapler validate "$dmg_path"

          echo "Assessing DMG with Gatekeeper: $dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"

          mount_point="$(mktemp -d "$RUNNER_TEMP/agentkitforge-dmg.XXXXXX")"
          mounted=false
          cleanup() {
            if [ "$mounted" = true ]; then
              hdiutil detach "$mount_point" -quiet || true
            fi
          }
          trap cleanup EXIT

          echo "Mounting DMG read-only for contained app verification: $dmg_path"
          hdiutil attach "$dmg_path" -readonly -nobrowse -mountpoint "$mount_point" -quiet
          mounted=true

          mounted_app_path="$(find "$mount_point" -maxdepth 2 -name 'AgentKitForge.app' -type d | head -n 1)"
          if [ -z "$mounted_app_path" ]; then
            echo "No AgentKitForge.app found inside notarized DMG." >&2
            exit 1
          fi

          echo "Verifying mounted app bundle signature: $mounted_app_path"
          codesign --verify --deep --strict --verbose=2 "$mounted_app_path"
          codesign --display --verbose=2 "$mounted_app_path"

          mounted_node_path="$mounted_app_path/Contents/MacOS/node"
          if [ ! -f "$mounted_node_path" ]; then
            echo "No bundled Node sidecar found inside mounted app." >&2
            exit 1
          fi

          echo "Verifying mounted Node sidecar entitlements: $mounted_node_path"
          mounted_node_entitlements="$RUNNER_TEMP/mounted-node-sidecar-entitlements.plist"
          codesign -d --entitlements :- "$mounted_node_path" > "$mounted_node_entitlements" 2>&1
          cat "$mounted_node_entitlements"
          grep -q "com.apple.security.cs.allow-jit" "$mounted_node_entitlements"
          grep -q "com.apple.security.cs.allow-unsigned-executable-memory" "$mounted_node_entitlements"

          echo "Assessing mounted app bundle with Gatekeeper: $mounted_app_path"
          spctl --assess --type execute --verbose=4 "$mounted_app_path"

      - name: Collect Windows release artifacts
        if: ${{ matrix.platform == 'windows' }}
        id: windows-artifacts
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $setupSource = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $setupSource) {
            throw "No NSIS setup executable found."
          }

          $msiSource = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msiSource) {
            throw "No MSI installer found."
          }

          Copy-Item -LiteralPath $setupSource.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-setup.exe") -Force
          Copy-Item -LiteralPath $msiSource.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-x64.msi") -Force

          $setupSig = "$($setupSource.FullName).sig"
          $msiSig = "$($msiSource.FullName).sig"
          if (-not (Test-Path -LiteralPath $setupSig)) {
            throw "No signed updater signature found for NSIS setup executable."
          }
          if (-not (Test-Path -LiteralPath $msiSig)) {
            throw "No signed updater signature found for MSI installer."
          }

          Copy-Item -LiteralPath $setupSig -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-setup.exe.sig") -Force
          Copy-Item -LiteralPath $msiSig -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-x64.msi.sig") -Force

      - name: Validate Windows signing configuration
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
          TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME || secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME || secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT || secrets.TRUSTED_SIGNING_ENDPOINT }}
        run: |
          $required = @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "TRUSTED_SIGNING_ACCOUNT_NAME",
            "TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME",
            "TRUSTED_SIGNING_ENDPOINT"
          )

          $missing = $required | Where-Object { [string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($_)) }
          if ($missing) {
            throw "Missing required Windows Trusted Signing configuration: $($missing -join ', ')"
          }

          $files = @(
            "release-assets/AgentKitForge-${{ steps.release-info.outputs.version }}-setup.exe",
            "release-assets/AgentKitForge-${{ steps.release-info.outputs.version }}-x64.msi"
          )
          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file)) {
              throw "Windows signing input not found: $file"
            }
          }

          Write-Host "Windows code signing started."
          Write-Host "Files being signed:"
          $files | ForEach-Object { Write-Host "- $_" }

      - name: Set up .NET for Windows signing
        if: ${{ matrix.platform == 'windows' }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Azure login for Windows signing
        if: ${{ matrix.platform == 'windows' }}
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows release artifacts with Trusted Signing
        if: ${{ matrix.platform == 'windows' }}
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT || secrets.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME || secrets.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME || secrets.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\release-assets\AgentKitForge-${{ steps.release-info.outputs.version }}-setup.exe
            ${{ github.workspace }}\release-assets\AgentKitForge-${{ steps.release-info.outputs.version }}-x64.msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify Windows Authenticode signatures
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if (-not $signtool) {
            $kitsRoot = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
            $signtool = Get-ChildItem $kitsRoot -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*\x64\signtool.exe" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1
          }
          if (-not $signtool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          $files = @(
            "release-assets/AgentKitForge-$env:VERSION-setup.exe",
            "release-assets/AgentKitForge-$env:VERSION-x64.msi"
          )

          foreach ($file in $files) {
            Write-Host "Verifying Authenticode signature: $file"
            & $signtool.FullName verify /pa /tw /v $file
            if ($LASTEXITCODE -ne 0) {
              throw "Windows Authenticode signature verification failed for $file."
            }
          }

          Write-Host "Windows code signing completed."
          Write-Host "Windows signature verification completed."

      - name: Collect macOS release artifacts
        if: ${{ matrix.platform == 'macos' }}
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
          RUNNER_ARCH_NAME: ${{ runner.arch }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $arch = $env:RUNNER_ARCH_NAME.ToLowerInvariant()
          if ($arch -eq "x64") { $arch = "x64" }
          elseif ($arch -eq "arm64") { $arch = "arm64" }

          $dmg = Get-ChildItem "src-tauri/target/release/bundle/dmg" -Filter "*.dmg" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $dmg) {
            throw "No signed/notarized macOS DMG found."
          }

          Copy-Item -LiteralPath $dmg.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-macos-$arch.dmg") -Force

          $updateArchive = Get-ChildItem "src-tauri/target/release/bundle/macos" -Filter "*.app.tar.gz" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $updateArchive) {
            throw "No macOS updater archive found."
          }
          $updateSignature = "$($updateArchive.FullName).sig"
          if (-not (Test-Path -LiteralPath $updateSignature)) {
            throw "No signed macOS updater signature found."
          }

          Copy-Item -LiteralPath $updateArchive.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-macos-$arch.app.tar.gz") -Force
          Copy-Item -LiteralPath $updateSignature -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-macos-$arch.app.tar.gz.sig") -Force

      - name: Collect Linux release artifacts
        if: ${{ matrix.platform == 'linux' }}
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $appImage = Get-ChildItem "src-tauri/target/release/bundle/appimage" -Filter "*.AppImage" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($appImage) {
            Copy-Item -LiteralPath $appImage.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-x86_64.AppImage") -Force
            $appImageSig = "$($appImage.FullName).sig"
            if (-not (Test-Path -LiteralPath $appImageSig)) {
              throw "No signed Linux AppImage updater signature found."
            }
            Copy-Item -LiteralPath $appImageSig -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-x86_64.AppImage.sig") -Force
          }

          $deb = Get-ChildItem "src-tauri/target/release/bundle/deb" -Filter "*.deb" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($deb) {
            Copy-Item -LiteralPath $deb.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-amd64.deb") -Force
          }

          $rpm = Get-ChildItem "src-tauri/target/release/bundle/rpm" -Filter "*.rpm" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($rpm) {
            Copy-Item -LiteralPath $rpm.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-x86_64.rpm") -Force
          }

          if (-not (Get-ChildItem $assetDir -File)) {
            throw "No Linux AppImage, deb, or rpm artifact found."
          }

      - name: Generate platform checksums
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          $checksumsOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-$env:PLATFORM-checksums.txt"

          Get-ChildItem $assetDir -File |
            Where-Object { $_.Name -notlike "*checksums.txt" } |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -LiteralPath $checksumsOut -Encoding ascii

      - name: Create artifact manifest
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          $manifestDir = Join-Path $PWD "artifact-manifests"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null

          $files = Get-ChildItem $assetDir -File | ForEach-Object { $_.Name }
          if (-not $files) {
            throw "No release assets were collected for $env:PLATFORM."
          }

          $checksumFiles = $files | Where-Object { $_ -like "*checksums.txt" }
          if (-not $checksumFiles) {
            throw "No checksum file was generated for $env:PLATFORM."
          }

          $updatePlatforms = @()
          if ($env:PLATFORM -eq "windows") {
            $urlAsset = "AgentKitForge-$env:VERSION-setup.exe"
            $signatureAsset = "$urlAsset.sig"
            if (($files -notcontains $urlAsset) -or ($files -notcontains $signatureAsset)) {
              throw "Windows updater metadata requires $urlAsset and $signatureAsset."
            }
            $updatePlatforms += @{ key = "windows-x86_64"; urlAsset = $urlAsset; signatureAsset = $signatureAsset }
          } elseif ($env:PLATFORM -eq "macos") {
            $archive = $files | Where-Object { $_ -like "AgentKitForge-*-macos-*.app.tar.gz" } | Select-Object -First 1
            if (-not $archive) {
              throw "macOS updater metadata requires a .app.tar.gz archive."
            }
            $signatureAsset = "$archive.sig"
            if ($files -notcontains $signatureAsset) {
              throw "macOS updater metadata requires $signatureAsset."
            }
            $platformKey = if ($archive -like "*-macos-arm64.app.tar.gz") { "darwin-aarch64" } else { "darwin-x86_64" }
            $updatePlatforms += @{ key = $platformKey; urlAsset = $archive; signatureAsset = $signatureAsset }
          } elseif ($env:PLATFORM -eq "linux") {
            $urlAsset = "AgentKitForge-$env:VERSION-linux-x86_64.AppImage"
            $signatureAsset = "$urlAsset.sig"
            if (($files -notcontains $urlAsset) -or ($files -notcontains $signatureAsset)) {
              throw "Linux updater metadata requires $urlAsset and $signatureAsset."
            }
            $updatePlatforms += @{ key = "linux-x86_64"; urlAsset = $urlAsset; signatureAsset = $signatureAsset }
          }

          @{
            platform = $env:PLATFORM
            artifacts = @($files)
            updatePlatforms = @($updatePlatforms)
          } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath (Join-Path $manifestDir "$env:PLATFORM.json") -Encoding utf8

      - name: Upload artifacts to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-info.outputs.tag }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
        run: |
          $assetFiles = Get-ChildItem "release-assets" -File | ForEach-Object { $_.FullName }
          if (-not $assetFiles) {
            throw "No release assets were collected."
          }

          $args = @("release", "upload", $env:TAG, "--repo", $env:SOURCE_REPO) + $assetFiles + @("--clobber")
          gh @args

      - name: Upload artifact manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-manifest-${{ matrix.platform }}
          path: artifact-manifests/${{ matrix.platform }}.json
          if-no-files-found: error

      - name: Upload release notes
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-info.outputs.tag }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
        run: gh release upload $env:TAG --repo $env:SOURCE_REPO "RELEASE_NOTES.md" --clobber

  dispatch-infra-mirror:
    name: Dispatch private infra mirror
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build-release-artifacts
    if: ${{ (needs.release-please.outputs.release_created == 'true' || needs.release-please.outputs.releases_created == 'true') && success() }}
    steps:
      - name: Require infra dispatch token
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "$INFRA_DISPATCH_TOKEN" ]; then
            echo "AGENTKIT_INFRA_DISPATCH_TOKEN is required to dispatch the private infra mirror workflow after artifact upload." >&2
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Download artifact manifests
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifact-manifest-*
          path: artifact-manifests
          merge-multiple: true

      - name: Verify uploaded artifacts before mirroring
        id: mirror-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
          TAG: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
          REQUIRED_PLATFORMS: windows,macos,linux
        run: |
          set -euo pipefail

          shopt -s nullglob
          manifest_files=(artifact-manifests/*.json)
          if [ "${#manifest_files[@]}" -eq 0 ]; then
            echo "No artifact manifests were produced; refusing to mirror website downloads." >&2
            exit 1
          fi

          release_assets_json="$(gh release view "$TAG" --repo "$SOURCE_REPO" --json assets)"
          artifact_names_json="$(jq -s '[.[].artifacts[]] | unique' "${manifest_files[@]}")"
          platforms_json="$(jq -s '[.[].platform] | unique' "${manifest_files[@]}")"
          update_platforms_json="$(jq -s '[.[].updatePlatforms[]?] | unique_by(.key)' "${manifest_files[@]}")"

          for platform in ${REQUIRED_PLATFORMS//,/ }; do
            if ! jq -e --arg platform "$platform" 'index($platform)' <<< "$platforms_json" >/dev/null; then
              echo "Missing artifact manifest for required platform '$platform'; refusing to mirror website downloads." >&2
              exit 1
            fi

            if ! jq -e --arg suffix "$platform-checksums.txt" 'any(.[]; endswith($suffix))' <<< "$artifact_names_json" >/dev/null; then
              echo "Missing checksum artifact for required platform '$platform'; refusing to mirror website downloads." >&2
              exit 1
            fi
          done

          while IFS= read -r artifact; do
            if ! jq -e --arg name "$artifact" '.assets | any(.name == $name)' <<< "$release_assets_json" >/dev/null; then
              echo "Release asset '$artifact' is missing from GitHub Release '$TAG'; refusing to mirror website downloads." >&2
              exit 1
            fi
          done < <(jq -r '.[]' <<< "$artifact_names_json")

          if [ "$(jq 'length' <<< "$update_platforms_json")" -eq 0 ]; then
            echo "No updater metadata entries were produced; refusing to mirror website downloads." >&2
            exit 1
          fi

          while IFS=$'\t' read -r platform_key url_asset signature_asset; do
            if [ -z "$platform_key" ] || [ -z "$url_asset" ] || [ -z "$signature_asset" ]; then
              echo "Updater metadata contains an incomplete platform entry." >&2
              exit 1
            fi
            for artifact in "$url_asset" "$signature_asset"; do
              if ! jq -e --arg name "$artifact" 'index($name)' <<< "$artifact_names_json" >/dev/null; then
                echo "Updater metadata for '$platform_key' references '$artifact', but the artifact manifest does not include it." >&2
                exit 1
              fi
              if ! jq -e --arg name "$artifact" '.assets | any(.name == $name)' <<< "$release_assets_json" >/dev/null; then
                echo "Updater metadata for '$platform_key' references '$artifact', but the GitHub Release does not include it." >&2
                exit 1
              fi
            done
          done < <(jq -r '.[] | [.key, .urlAsset, .signatureAsset] | @tsv' <<< "$update_platforms_json")

          release_notes="$(cat RELEASE_NOTES.md 2>/dev/null || true)"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          metadata_file="AgentKitForge-${VERSION}-update-metadata.json"
          jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg notes "$release_notes" \
            --arg pub_date "$pub_date" \
            --argjson update_platforms "$update_platforms_json" \
            '{
              version: $version,
              tag: $tag,
              notes: $notes,
              pub_date: $pub_date,
              platforms: ($update_platforms | reduce .[] as $platform ({}; .[$platform.key] = {
                urlAsset: $platform.urlAsset,
                signatureAsset: $platform.signatureAsset
              }))
            }' > "$metadata_file"

          gh release upload "$TAG" "$metadata_file" --repo "$SOURCE_REPO" --clobber
          artifact_names_json="$(jq --arg metadata "$metadata_file" '. + [$metadata] | unique' <<< "$artifact_names_json")"

          echo "Verified uploaded release artifacts:"
          jq -r '.[]' <<< "$artifact_names_json"

          {
            echo "platforms_json=$(jq -c . <<< "$platforms_json")"
            echo "artifact_names_json=$(jq -c . <<< "$artifact_names_json")"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger private infra mirror
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          RELEASE_URL: ${{ needs.release-please.outputs.html_url }}
          REPOSITORY: AgentKitProject/agentkitforge-app
          PLATFORMS_JSON: ${{ steps.mirror-assets.outputs.platforms_json }}
          ARTIFACT_NAMES_JSON: ${{ steps.mirror-assets.outputs.artifact_names_json }}
        run: |
          payload="$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg repository "$REPOSITORY" \
            --arg release_url "$RELEASE_URL" \
            --argjson platforms "$PLATFORMS_JSON" \
            --argjson artifacts "$ARTIFACT_NAMES_JSON" \
            '{
              event_type: "app-release-published",
              client_payload: {
                version: $version,
                tag: $tag,
                repository: $repository,
                release_url: $release_url,
                platforms: $platforms,
                artifacts: $artifacts
              }
            }')"

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $INFRA_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AgentKitProject/agentkitforge-infra/dispatches \
            -d "$payload"
