name: Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Check and frontend build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: agentkitforge-app

      - name: Install Linux Tauri dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: agentkitforge-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install app dependencies
        working-directory: agentkitforge-app
        run: npm ci

      - name: Run check
        working-directory: agentkitforge-app
        run: npm run check

      - name: Build frontend and backend bridge
        working-directory: agentkitforge-app
        run: npm run build

      - name: Verify bundled backend runtime
        working-directory: agentkitforge-app
        run: npm run check:backend

  tauri-build-smoke:
    name: Tauri build smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: agentkitforge-app

      - name: Install Linux Tauri dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: agentkitforge-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install app dependencies
        working-directory: agentkitforge-app
        run: npm ci

      - name: Build Tauri app
        working-directory: agentkitforge-app
        run: npm run build:tauri

      - name: Verify bundled backend runtime
        working-directory: agentkitforge-app
        run: npm run check:backend

      - name: Verify Tauri sidecar output
        working-directory: agentkitforge-app
        run: npm run check:tauri-sidecar
