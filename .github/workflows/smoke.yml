name: Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Check and frontend build
    runs-on: windows-latest
    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: agentkitforge-app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: agentkitforge-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Git access for core dependency
        env:
          CORE_TOKEN: ${{ secrets.AGENTKITFORGE_CORE_READ_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:$env:CORE_TOKEN@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:$env:CORE_TOKEN@github.com/".insteadOf "git@github.com:"

      - name: Install app dependencies
        working-directory: agentkitforge-app
        run: npm ci

      - name: Run check
        working-directory: agentkitforge-app
        run: npm run check

      - name: Build frontend
        working-directory: agentkitforge-app
        run: npm run build

  tauri-build-smoke:
    name: Tauri build smoke
    runs-on: windows-latest
    needs: smoke
    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: agentkitforge-app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: agentkitforge-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Git access for core dependency
        env:
          CORE_TOKEN: ${{ secrets.AGENTKITFORGE_CORE_READ_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:$env:CORE_TOKEN@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:$env:CORE_TOKEN@github.com/".insteadOf "git@github.com:"

      - name: Install app dependencies
        working-directory: agentkitforge-app
        run: npm ci

      - name: Build Tauri app
        working-directory: agentkitforge-app
        run: npm run build:tauri
