name: Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  platform-build-smoke:
    name: Platform build smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - name: Check out app
        uses: actions/checkout@v4
        with:
          path: agentkitforge-app

      - name: Install Linux Tauri dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: agentkitforge-app/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install app dependencies
        working-directory: agentkitforge-app
        run: npm ci

      - name: Build backend runtime bundle
        working-directory: agentkitforge-app
        run: npm run build:backend

      - name: Verify backend runtime bundle before Tauri build
        working-directory: agentkitforge-app
        run: npm run check:backend

      - name: Run checks
        working-directory: agentkitforge-app
        run: npm run check

      - name: Build Tauri app
        if: ${{ runner.os != 'macOS' }}
        working-directory: agentkitforge-app
        run: npm run build:tauri

      - name: Build Tauri app bundle
        if: ${{ runner.os == 'macOS' }}
        working-directory: agentkitforge-app
        run: npm run build:tauri -- --bundles app

      - name: Verify packaged runtime resources
        working-directory: agentkitforge-app
        run: npm run check:tauri-sidecar
