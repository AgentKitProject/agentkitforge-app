name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version to rebuild, for example 0.2.0 or v0.2.0"
        required: true
        type: string
      platforms:
        description: "Platforms to build: windows, macos, linux, or all"
        required: false
        default: windows
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      replace_existing_assets:
        description: "Replace assets if they already exist on the GitHub Release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  prepare:
    name: Prepare artifact build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.platforms.outputs.matrix }}
      platforms: ${{ steps.platforms.outputs.platforms }}
      version: ${{ steps.release-info.outputs.version }}
      tag: ${{ steps.release-info.outputs.tag }}
      release_url: ${{ steps.github-release.outputs.release_url }}
    steps:
      - name: Determine release version
        id: release-info
        shell: pwsh
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $tag = $env:INPUT_VERSION

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to determine release version. Provide workflow_dispatch input 'version'."
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Release version '$version' is not a valid SemVer version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Select platforms
        id: platforms
        shell: pwsh
        env:
          INPUT_PLATFORMS: ${{ inputs.platforms }}
        run: |
          $selection = $env:INPUT_PLATFORMS
          if ([string]::IsNullOrWhiteSpace($selection)) {
            $selection = "windows"
          }

          $platforms = switch ($selection) {
            "windows" { @(@{ platform = "windows"; os = "windows-latest" }) }
            "macos" { @(@{ platform = "macos"; os = "macos-latest" }) }
            "linux" { @(@{ platform = "linux"; os = "ubuntu-latest" }) }
            "all" {
              @(
                @{ platform = "windows"; os = "windows-latest" },
                @{ platform = "macos"; os = "macos-latest" },
                @{ platform = "linux"; os = "ubuntu-latest" }
              )
            }
            default { throw "Unsupported platforms input '$selection'. Use windows, macos, linux, or all." }
          }

          $matrix = @{ include = $platforms } | ConvertTo-Json -Depth 5 -Compress
          $platformNames = ($platforms | ForEach-Object { $_.platform }) -join ","

          "matrix=$matrix" >> $env:GITHUB_OUTPUT
          "platforms=$platformNames" >> $env:GITHUB_OUTPUT

      - name: Verify GitHub Release exists
        id: github-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
          TAG: ${{ steps.release-info.outputs.tag }}
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          SOURCE_REPO="${SOURCE_REPO:-AgentKitProject/agentkitforge-app}"
          echo "SOURCE_REPO=$SOURCE_REPO"
          echo "VERSION=$VERSION"
          echo "TAG=$TAG"

          release_url="$(gh release view "$TAG" --repo "$SOURCE_REPO" --json url --jq .url)"
          if [ -z "$release_url" ]; then
            echo "GitHub Release '$TAG' does not exist." >&2
            exit 1
          fi
          echo "release_url=$release_url"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build ${{ matrix.platform }} artifacts
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check out requested tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Apple signing secrets
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          missing=()
          for name in \
            APPLE_CERTIFICATE_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID \
            APPLE_API_KEY_ID \
            APPLE_API_ISSUER_ID \
            APPLE_API_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required macOS signing/notarization secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          certificate_path="$RUNNER_TEMP/developer_id_application.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          identities_file="$RUNNER_TEMP/codesigning-identities.txt"
          security find-identity -v -p codesigning "$keychain_path" | tee "$identities_file"

          if grep -q "0 valid identities found" "$identities_file"; then
            echo "No valid code signing identities were found after importing APPLE_CERTIFICATE_BASE64. Confirm the .p12 contains both the Developer ID Application certificate and its private key." >&2
            exit 1
          fi

          if ! grep -q "Developer ID Application" "$identities_file"; then
            echo "No Developer ID Application identity was found after importing APPLE_CERTIFICATE_BASE64." >&2
            echo "Available signing identity display names:" >&2
            awk -F'"' '/[A-Fa-f0-9]{40}/ { print "- " $2 }' "$identities_file" >&2
            exit 1
          fi

          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            matching_line="$(awk -F'"' -v target="$APPLE_SIGNING_IDENTITY" '$2 == target { print; exit }' "$identities_file")"
            if [ -z "$matching_line" ]; then
              echo "APPLE_SIGNING_IDENTITY does not match any imported signing identity." >&2
              echo "APPLE_SIGNING_IDENTITY does not match the imported identity. Use the exact value shown by security find-identity." >&2
              echo "Available signing identity display names:" >&2
              awk -F'"' '/[A-Fa-f0-9]{40}/ { print "- " $2 }' "$identities_file" >&2
              exit 1
            fi
          else
            matching_line="$(grep "Developer ID Application" "$identities_file" | head -n 1)"
          fi

          identity_hash="$(sed -E 's/^[[:space:]]*[0-9]+\) ([A-Fa-f0-9]{40}) .*/\1/' <<< "$matching_line")"
          if [[ ! "$identity_hash" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            echo "Could not extract SHA-1 signing identity hash from imported Developer ID Application identity." >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY_HASH=$identity_hash" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_IDENTITY=$identity_hash" >> "$GITHUB_ENV"
          echo "Developer ID Application signing identity imported successfully."
          echo "Using Developer ID Application identity hash: $identity_hash"

      - name: Prepare App Store Connect API key
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          private_keys_dir="$RUNNER_TEMP/private_keys"
          mkdir -p "$private_keys_dir"
          api_key_path="$private_keys_dir/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
          echo "Prepared App Store Connect API key file."

      - name: Preflight codesign identity
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY_HASH:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY_HASH was not set after certificate import." >&2
            exit 1
          fi

          preflight_dir="$RUNNER_TEMP/codesign-preflight"
          preflight_executable="$preflight_dir/preflight"
          mkdir -p "$preflight_dir"
          printf '%s\n' '#!/bin/sh' 'exit 0' > "$preflight_executable"
          chmod +x "$preflight_executable"

          if ! codesign --force --sign "$APPLE_SIGNING_IDENTITY_HASH" --timestamp=none "$preflight_executable"; then
            echo "Preflight codesign failed. The certificate was imported but codesign cannot use it." >&2
            exit 1
          fi

          codesign --verify --verbose "$preflight_executable"
          echo "Preflight codesign succeeded with identity hash: $APPLE_SIGNING_IDENTITY_HASH"

      - name: Install Linux Tauri dependencies
        if: ${{ matrix.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Verify release version
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($packageVersion -ne $env:VERSION) {
            throw "package.json version '$packageVersion' does not match release version '$env:VERSION'."
          }

      - name: Install dependencies
        run: npm ci

      - name: Build backend runtime
        run: npm run build:backend

      - name: Verify backend bundle exists
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/backend-dist")) {
            throw "src-tauri/backend-dist was not created."
          }

      - name: Run checks
        run: npm run check

      - name: Build Tauri app
        if: ${{ matrix.platform != 'macos' }}
        run: npm run build:tauri

      - name: Build signed and notarized Tauri app
        if: ${{ matrix.platform == 'macos' }}
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: npm run build:tauri -- --bundles dmg

      - name: Verify bundled backend runtime
        run: npm run check:backend

      - name: Verify Tauri sidecar output
        run: npm run check:tauri-sidecar

      - name: Verify macOS signing and notarization
        if: ${{ matrix.platform == 'macos' }}
        shell: bash
        run: |
          app_path="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          dmg_path="$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"

          if [ -z "$app_path" ]; then
            echo "No macOS app bundle found to verify." >&2
            exit 1
          fi

          if [ -z "$dmg_path" ]; then
            echo "No macOS DMG found to verify." >&2
            exit 1
          fi

          echo "Verifying app bundle signature: $app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign --display --verbose=2 "$app_path"

          echo "Validating app notarization ticket: $app_path"
          xcrun stapler validate "$app_path"

          echo "Assessing app bundle with Gatekeeper: $app_path"
          spctl --assess --type execute --verbose=4 "$app_path"

          echo "Validating DMG notarization ticket: $dmg_path"
          xcrun stapler validate "$dmg_path"

          echo "Assessing DMG with Gatekeeper: $dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"

      - name: Collect Windows artifacts
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $setupSource = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $setupSource) {
            throw "No NSIS setup executable found."
          }

          $msiSource = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msiSource) {
            throw "No MSI installer found."
          }

          Copy-Item -LiteralPath $setupSource.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-setup.exe") -Force
          Copy-Item -LiteralPath $msiSource.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-x64.msi") -Force

      - name: Collect macOS artifacts
        if: ${{ matrix.platform == 'macos' }}
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RUNNER_ARCH_NAME: ${{ runner.arch }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $arch = $env:RUNNER_ARCH_NAME.ToLowerInvariant()
          if ($arch -eq "x64") { $arch = "x64" }
          elseif ($arch -eq "arm64") { $arch = "arm64" }

          $dmg = Get-ChildItem "src-tauri/target/release/bundle/dmg" -Filter "*.dmg" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dmg) {
            Copy-Item -LiteralPath $dmg.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-macos-$arch.dmg") -Force
          }

          if (-not (Get-ChildItem $assetDir -File)) {
            throw "No signed/notarized macOS DMG artifact found."
          }

      - name: Collect Linux artifacts
        if: ${{ matrix.platform == 'linux' }}
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $appImage = Get-ChildItem "src-tauri/target/release/bundle/appimage" -Filter "*.AppImage" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($appImage) {
            Copy-Item -LiteralPath $appImage.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-x86_64.AppImage") -Force
          }

          $deb = Get-ChildItem "src-tauri/target/release/bundle/deb" -Filter "*.deb" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($deb) {
            Copy-Item -LiteralPath $deb.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-amd64.deb") -Force
          }

          $rpm = Get-ChildItem "src-tauri/target/release/bundle/rpm" -Filter "*.rpm" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($rpm) {
            Copy-Item -LiteralPath $rpm.FullName -Destination (Join-Path $assetDir "AgentKitForge-$env:VERSION-linux-x86_64.rpm") -Force
          }

          if (-not (Get-ChildItem $assetDir -File)) {
            throw "No Linux AppImage, deb, or rpm artifact found."
          }

      - name: Generate platform checksums
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          $checksumsOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-$env:PLATFORM-checksums.txt"

          Get-ChildItem $assetDir -File |
            Where-Object { $_.Name -notlike "*checksums.txt" } |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -LiteralPath $checksumsOut -Encoding ascii

      - name: Create artifact manifest
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          $manifestDir = Join-Path $PWD "artifact-manifests"
          New-Item -ItemType Directory -Force -Path $manifestDir | Out-Null

          $files = Get-ChildItem $assetDir -File | ForEach-Object { $_.Name }
          if (-not $files) {
            throw "No release assets were collected for $env:PLATFORM."
          }

          $checksumFiles = $files | Where-Object { $_ -like "*checksums.txt" }
          if (-not $checksumFiles) {
            throw "No checksum file was generated for $env:PLATFORM."
          }

          @{
            platform = $env:PLATFORM
            artifacts = @($files)
          } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath (Join-Path $manifestDir "$env:PLATFORM.json") -Encoding utf8

      - name: Upload artifacts to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
          TAG: ${{ needs.prepare.outputs.tag }}
          REPLACE_EXISTING_ASSETS: ${{ inputs.replace_existing_assets }}
        run: |
          $assetFiles = Get-ChildItem "release-assets" -File | ForEach-Object { $_.FullName }
          if (-not $assetFiles) {
            throw "No release assets were collected."
          }

          $args = @("release", "upload", $env:TAG) + $assetFiles
          $args += @("--repo", $env:SOURCE_REPO)

          if ($env:REPLACE_EXISTING_ASSETS -eq "true") {
            $args += "--clobber"
          }

          gh @args

      - name: Upload artifact manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-manifest-${{ matrix.platform }}
          path: artifact-manifests/${{ matrix.platform }}.json
          if-no-files-found: error

  dispatch-infra:
    name: Dispatch private infra mirror
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-artifacts
    if: ${{ success() }}
    steps:
      - name: Check out requested tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Upload release notes to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
          TAG: ${{ needs.prepare.outputs.tag }}
          REPLACE_EXISTING_ASSETS: ${{ inputs.replace_existing_assets }}
        run: |
          SOURCE_REPO="${SOURCE_REPO:-AgentKitProject/agentkitforge-app}"
          args=(release upload "$TAG" "RELEASE_NOTES.md" --repo "$SOURCE_REPO")

          if [ "$REPLACE_EXISTING_ASSETS" = "true" ]; then
            args+=(--clobber)
          fi

          gh "${args[@]}"

      - name: Download artifact manifests
        uses: actions/download-artifact@v4
        with:
          pattern: release-artifact-manifest-*
          path: artifact-manifests
          merge-multiple: true

      - name: Verify uploaded artifacts before mirroring
        id: mirror-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_REPO: AgentKitProject/agentkitforge-app
          TAG: ${{ needs.prepare.outputs.tag }}
          REQUIRED_PLATFORMS: ${{ needs.prepare.outputs.platforms }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          manifest_files=(artifact-manifests/*.json)
          if [ "${#manifest_files[@]}" -eq 0 ]; then
            echo "No artifact manifests were produced; refusing to mirror website downloads." >&2
            exit 1
          fi

          release_assets_json="$(gh release view "$TAG" --repo "$SOURCE_REPO" --json assets)"
          artifact_names_json="$(jq -s '[.[].artifacts[]] | unique' "${manifest_files[@]}")"
          platforms_json="$(jq -s '[.[].platform] | unique' "${manifest_files[@]}")"

          IFS=',' read -ra required_platforms <<< "$REQUIRED_PLATFORMS"
          for platform in "${required_platforms[@]}"; do
            if ! jq -e --arg platform "$platform" 'index($platform)' <<< "$platforms_json" >/dev/null; then
              echo "Missing artifact manifest for selected platform '$platform'; refusing to mirror website downloads." >&2
              exit 1
            fi

            if ! jq -e --arg suffix "$platform-checksums.txt" 'any(.[]; endswith($suffix))' <<< "$artifact_names_json" >/dev/null; then
              echo "Missing checksum artifact for selected platform '$platform'; refusing to mirror website downloads." >&2
              exit 1
            fi
          done

          while IFS= read -r artifact; do
            if ! jq -e --arg name "$artifact" '.assets | any(.name == $name)' <<< "$release_assets_json" >/dev/null; then
              echo "Release asset '$artifact' is missing from GitHub Release '$TAG'; refusing to mirror website downloads." >&2
              exit 1
            fi
          done < <(jq -r '.[]' <<< "$artifact_names_json")

          echo "Verified uploaded release artifacts:"
          jq -r '.[]' <<< "$artifact_names_json"

          {
            echo "platforms_json=$(jq -c . <<< "$platforms_json")"
            echo "artifact_names_json=$(jq -c . <<< "$artifact_names_json")"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger private infra mirror
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_URL: ${{ needs.prepare.outputs.release_url }}
          REPOSITORY: AgentKitProject/agentkitforge-app
          PLATFORMS_JSON: ${{ steps.mirror-assets.outputs.platforms_json }}
          ARTIFACT_NAMES_JSON: ${{ steps.mirror-assets.outputs.artifact_names_json }}
        run: |
          if [ -z "$INFRA_DISPATCH_TOKEN" ]; then
            echo "AGENTKIT_INFRA_DISPATCH_TOKEN is not set; skipping infra dispatch for this manual run."
            exit 0
          fi

          payload="$(jq -n \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            --arg repository "$REPOSITORY" \
            --arg release_url "$RELEASE_URL" \
            --argjson platforms "$PLATFORMS_JSON" \
            --argjson artifacts "$ARTIFACT_NAMES_JSON" \
            '{
              event_type: "app-release-published",
              client_payload: {
                version: $version,
                tag: $tag,
                repository: $repository,
                release_url: $release_url,
                platforms: $platforms,
                artifacts: $artifacts
              }
            }')"

          curl -fsSL \
            -X POST \
            -H "Authorization: Bearer $INFRA_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AgentKitProject/agentkitforge-infra/dispatches \
            -d "$payload"
