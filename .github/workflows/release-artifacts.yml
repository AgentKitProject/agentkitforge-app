name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to rebuild, for example 0.1.0 or v0.1.0"
        required: false
        type: string

permissions:
  contents: write
  actions: read

jobs:
  windows-artifacts:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Determine release version
        id: release-info
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          $tag = ""
          if ($env:EVENT_NAME -eq "release") {
            $tag = $env:RELEASE_TAG
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_VERSION)) {
            $tag = $env:INPUT_VERSION
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Unable to determine release version. Provide workflow_dispatch input 'version' or run from a published release."
          }

          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }

          $version = $tag.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Release version '$version' is not a valid SemVer version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_url=$env:RELEASE_URL" >> $env:GITHUB_OUTPUT

      - name: Check out requested tag
        shell: pwsh
        env:
          TAG: ${{ steps.release-info.outputs.tag }}
        run: |
          git fetch --tags --force
          git checkout $env:TAG

      - name: Verify release version
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($packageVersion -ne $env:VERSION) {
            throw "package.json version '$packageVersion' does not match release version '$env:VERSION'."
          }

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build Tauri app
        run: npm run build:tauri

      - name: Collect release artifacts
        id: artifacts
        shell: pwsh
        env:
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          $assetDir = Join-Path $PWD "release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $setupSource = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $setupSource) {
            throw "No NSIS setup executable found."
          }

          $msiSource = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" | Select-Object -First 1
          if (-not $msiSource) {
            throw "No MSI installer found."
          }

          $setupOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-setup.exe"
          $msiOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-x64.msi"
          $checksumsOut = Join-Path $assetDir "AgentKitForge-$env:VERSION-checksums.txt"

          Copy-Item -LiteralPath $setupSource.FullName -Destination $setupOut -Force
          Copy-Item -LiteralPath $msiSource.FullName -Destination $msiOut -Force

          Get-FileHash $setupOut, $msiOut -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([System.IO.Path]::GetFileName($_.Path))" } |
            Set-Content -LiteralPath $checksumsOut -Encoding ascii

          "setup=$setupOut" >> $env:GITHUB_OUTPUT
          "msi=$msiOut" >> $env:GITHUB_OUTPUT
          "checksums=$checksumsOut" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release-info.outputs.tag }}
        run: |
          gh release upload $env:TAG `
            "${{ steps.artifacts.outputs.setup }}" `
            "${{ steps.artifacts.outputs.msi }}" `
            "${{ steps.artifacts.outputs.checksums }}" `
            "RELEASE_NOTES.md" `
            --clobber

      - name: Require infra dispatch token for published releases
        if: ${{ github.event_name == 'release' }}
        shell: pwsh
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:INFRA_DISPATCH_TOKEN)) {
            throw "AGENTKIT_INFRA_DISPATCH_TOKEN is required to dispatch the private infra mirror workflow after a published release."
          }

      - name: Trigger private infra mirror
        shell: pwsh
        env:
          INFRA_DISPATCH_TOKEN: ${{ secrets.AGENTKIT_INFRA_DISPATCH_TOKEN }}
          VERSION: ${{ steps.release-info.outputs.version }}
          TAG: ${{ steps.release-info.outputs.tag }}
          RELEASE_URL: ${{ steps.release-info.outputs.release_url }}
          REPOSITORY: AgentKitProject/agentkitforge-app
        run: |
          if ([string]::IsNullOrWhiteSpace($env:INFRA_DISPATCH_TOKEN)) {
            Write-Host "AGENTKIT_INFRA_DISPATCH_TOKEN is not set; skipping infra dispatch for this manual run."
            exit 0
          }

          $payload = @{
            event_type = "app-release-published"
            client_payload = @{
              version = $env:VERSION
              tag = $env:TAG
              repository = $env:REPOSITORY
              release_url = $env:RELEASE_URL
            }
          } | ConvertTo-Json -Depth 5 -Compress

          Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/AgentKitProject/agentkitforge-infra/dispatches" `
            -Headers @{
              Authorization = "Bearer $env:INFRA_DISPATCH_TOKEN"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            } `
            -Body $payload `
            -ContentType "application/json"
